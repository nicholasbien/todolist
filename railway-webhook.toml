[build]
builder = "NIXPACKS"
buildCommand = "cd scripts && npm install"
watchPatterns = ["scripts/**", "cli/**"]

[deploy]
startCommand = "node scripts/webhook-server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env.WEBHOOK_PORT]
value = "8080"

[env.WEBHOOK_HOST]
value = "0.0.0.0"

[env.NODE_ENV]
value = "production"

[env.AUTO_CLAIM_ENABLED]
value = "true"

[env.AGENT_ID]
value = "openclaw-webhook"

# Auth token is auto-provisioned from MongoDB on startup.
# Just set AGENT_USER_EMAIL and MONGODB_URL in Railway dashboard.
# TODOLIST_API_URL and DEFAULT_SPACE_ID also needed in Railway dashboard.

[nixpacks]
nodeVersion = "22"
