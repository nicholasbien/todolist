[build]
builder = "NIXPACKS"
buildCommand = "cd scripts && npm install"
watchPatterns = ["scripts/**", "cli/**"]

[deploy]
startCommand = "node scripts/webhook-server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env.WEBHOOK_PORT]
value = "8080"

[env.WEBHOOK_HOST]
value = "0.0.0.0"

[env.NODE_ENV]
value = "production"

[env.AUTO_CLAIM_ENABLED]
value = "true"

[env.AGENT_ID]
value = "openclaw-webhook"

# IMPORTANT: Set these via Railway dashboard (not here — secrets!)
# TODOLIST_AUTH_TOKEN = <set in Railway dashboard>
# TODOLIST_API_URL = <set in Railway dashboard>
# DEFAULT_SPACE_ID = <set in Railway dashboard>

[nixpacks]
nodeVersion = "22"
