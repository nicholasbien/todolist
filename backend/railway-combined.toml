[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 start_combined.py"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"

[nixpacks]
nodeVersion = "22"

[variables]
NODE_ENV = "production"
WEBHOOK_PORT = "8081"
WEBHOOK_HOST = "0.0.0.0"
AUTO_CLAIM_ENABLED = "true"
AGENT_ID = "openclaw-webhook"
