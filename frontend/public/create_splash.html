<!DOCTYPE html>
<html>
<head><title>Splash Screen Generator</title></head>
<body style="background: #ff7b4a; margin: 0; padding: 20px;">
<canvas id="canvas" width="2732" height="2732" style="max-width: 100%;"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const size = 2732;

// Orange background (same as logo)
ctx.fillStyle = '#ff7b4a';
ctx.fillRect(0, 0, size, size);

// Draw notebook logo (centered, scaled up)
const logoSize = 400;  // Make logo 400x400 in the center
const logoX = (size - logoSize) / 2;
const logoY = (size - logoSize) / 2 - 100;  // Offset up a bit to make room for text

// Copy the drawNotebook function from create_icons.html
function drawNotebook(ctx, x, y, logoSize) {
  const scale = logoSize / 192;

  // Background (transparent for splash)
  // ctx.fillStyle = '#ff7b4a';
  // ctx.fillRect(x, y, logoSize, logoSize);

  // Centered and bigger notebook with less border
  const canvasSize = 192;
  const centerX = canvasSize / 2;
  const centerY = canvasSize / 2;
  const notebookWidth = 130;
  const notebookHeight = 130;
  const spineWidth = 20;
  const offset3D = 6;

  // Calculate positions for proper centering (shifted left to account for visual weight)
  const totalVisualWidth = spineWidth + notebookWidth + offset3D;
  const leftEdge = (canvasSize - totalVisualWidth) / 2 - 8;
  const topEdge = (canvasSize - (notebookHeight + offset3D)) / 2;

  const spineX = leftEdge;
  const notebookX = leftEdge + spineWidth;
  const notebookY = topEdge;

  // Translate to center position
  ctx.save();
  ctx.translate(x, y);

  // Notebook spine (orange)
  ctx.fillStyle = '#ff7b4a';
  ctx.fillRect(spineX * scale, notebookY * scale, spineWidth * scale, notebookHeight * scale);

  // Back notebook cover (offset) - centered with more 3D depth
  ctx.fillStyle = '#ff7b4a';
  ctx.beginPath();
  ctx.roundRect((notebookX + 6) * scale, (notebookY + 6) * scale, notebookWidth * scale, notebookHeight * scale, 4 * scale);
  ctx.fill();
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 3.5 * scale;
  ctx.stroke();

  // Front notebook cover (main) - centered
  ctx.fillStyle = '#ff7b4a';
  ctx.beginPath();
  ctx.roundRect(notebookX * scale, notebookY * scale, notebookWidth * scale, notebookHeight * scale, 4 * scale);
  ctx.fill();
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 3.5 * scale;
  ctx.stroke();

  // Spiral binding - 5 rings (circles inside notebook)
  ctx.fillStyle = '#000000';
  const ringCount = 5;
  const ringSpacing = notebookHeight / (ringCount + 1);

  // Ring bodies - extend from spine into notebook (thicker to match notebook edges)
  for (let i = 1; i <= ringCount; i++) {
    const ry = notebookY + (i * ringSpacing);
    ctx.beginPath();
    ctx.roundRect((spineX + spineWidth / 2) * scale, (ry - 1.75) * scale, (spineWidth / 2 + 8) * scale, 3.5 * scale, 1.75 * scale);
    ctx.fill();
  }

  // Ring end circles - positioned inside notebook (solid black)
  for (let i = 1; i <= ringCount; i++) {
    const ry = notebookY + (i * ringSpacing);
    ctx.beginPath();
    ctx.arc((notebookX + 8) * scale, ry * scale, 5 * scale, 0, 2 * Math.PI);
    ctx.fill();
  }

  // Pink/salmon fill color for boxes
  const boxFillColor = '#ffb8a3';

  // Three checkboxes with text - centered in notebook
  const boxSize = 18;
  const boxX = notebookX + 20;
  const boxSpacing = notebookHeight / 4;

  // Draw 3 checkboxes
  for (let i = 0; i < 3; i++) {
    const boxY = notebookY + boxSpacing * (i + 0.7);

    // All boxes are pink/salmon (matching reference) with slight rounding
    ctx.fillStyle = boxFillColor;
    ctx.beginPath();
    ctx.roundRect(boxX * scale, boxY * scale, boxSize * scale, boxSize * scale, 2 * scale);
    ctx.fill();

    // Box border color matches line color - solid color calculated from opacity blend
    if (i === 1) {
      ctx.strokeStyle = '#000000';
    } else {
      ctx.strokeStyle = '#7f3d25';
    }
    ctx.lineWidth = 2.5 * scale;
    ctx.beginPath();
    ctx.roundRect(boxX * scale, boxY * scale, boxSize * scale, boxSize * scale, 2 * scale);
    ctx.stroke();

    // Text line next to checkbox - same color as box outline, thicker like reference
    ctx.lineWidth = 3.5 * scale;
    ctx.beginPath();
    ctx.moveTo((boxX + boxSize + 6) * scale, (boxY + boxSize/2) * scale);
    ctx.lineTo((notebookX + notebookWidth - 10) * scale, (boxY + boxSize/2) * scale);
    ctx.stroke();
  }

  // Cleaner, simpler checkmark in middle box (matching reference style)
  const middleBoxY = notebookY + boxSpacing * 1.7;
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 2.5 * scale;
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';
  ctx.beginPath();
  ctx.moveTo((boxX + 4) * scale, (middleBoxY + boxSize/2) * scale);
  ctx.lineTo((boxX + boxSize/2 - 1) * scale, (middleBoxY + boxSize - 5) * scale);
  ctx.lineTo((boxX + boxSize - 3) * scale, (middleBoxY + 4) * scale);
  ctx.stroke();

  ctx.restore();
}

// Draw the notebook logo
drawNotebook(ctx, logoX, logoY, logoSize);

// Draw "todolist.nyc" text below the logo
ctx.fillStyle = '#000000';  // Black text on orange background
ctx.font = 'bold 80px Georgia, serif';  // Matching app's serif font
ctx.textAlign = 'center';
ctx.textBaseline = 'top';
const textY = logoY + logoSize + 60;  // 60px below the logo
ctx.fillText('todolist.nyc', size / 2, textY);

// Convert to download
setTimeout(() => {
  const link = document.createElement('a');
  link.download = 'splash-2732x2732.png';
  link.href = canvas.toDataURL();
  link.click();

  console.log('Splash PNG data:', canvas.toDataURL());
}, 1000);
</script>
</body>
</html>
