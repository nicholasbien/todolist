<svg width="192" height="192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#ff7b4a"/>

  <!-- Notebook spine (same orange) -->
  <rect x="32" y="44" width="24" height="104" fill="#ff7b4a"/>

  <!-- Back notebook cover (offset) -->
  <rect x="62" y="50" width="104" height="104" rx="4" ry="4" fill="#ff7b4a" stroke="white" stroke-width="1.5"/>

  <!-- Front notebook cover (main) -->
  <rect x="56" y="44" width="104" height="104" rx="4" ry="4" fill="#ff7b4a" stroke="white" stroke-width="1.5"/>

  <!-- Spiral binding - equal distance inside and outside notebook -->
  <!-- Ring bodies (moderately rounded lines) -->
  <rect x="48" y="59" width="16" height="1.5" rx="0.75" fill="white"/>
  <rect x="48" y="70" width="16" height="1.5" rx="0.75" fill="white"/>
  <rect x="48" y="81" width="16" height="1.5" rx="0.75" fill="white"/>
  <rect x="48" y="92" width="16" height="1.5" rx="0.75" fill="white"/>
  <rect x="48" y="103" width="16" height="1.5" rx="0.75" fill="white"/>
  <rect x="48" y="114" width="16" height="1.5" rx="0.75" fill="white"/>
  <rect x="48" y="125" width="16" height="1.5" rx="0.75" fill="white"/>
  <rect x="48" y="136" width="16" height="1.5" rx="0.75" fill="white"/>

  <!-- Ring end circles -->
  <circle cx="64" cy="59.75" r="1.5" fill="white"/>
  <circle cx="64" cy="70.75" r="1.5" fill="white"/>
  <circle cx="64" cy="81.75" r="1.5" fill="white"/>
  <circle cx="64" cy="92.75" r="1.5" fill="white"/>
  <circle cx="64" cy="103.75" r="1.5" fill="white"/>
  <circle cx="64" cy="114.75" r="1.5" fill="white"/>
  <circle cx="64" cy="125.75" r="1.5" fill="white"/>
  <circle cx="64" cy="136.75" r="1.5" fill="white"/>

  <!-- Three vertical boxes -->
  <rect x="78" y="68" width="16" height="16" fill="none" stroke="white" stroke-width="1"/>
  <rect x="78" y="88" width="16" height="16" fill="none" stroke="white" stroke-width="1"/>
  <rect x="78" y="108" width="16" height="16" fill="none" stroke="white" stroke-width="1"/>

  <!-- Text lines next to boxes -->
  <line x1="98" y1="74" x2="140" y2="74" stroke="white" stroke-width="1"/>
  <line x1="98" y1="78" x2="135" y2="78" stroke="white" stroke-width="1"/>
  <line x1="98" y1="94" x2="145" y2="94" stroke="white" stroke-width="1"/>
  <line x1="98" y1="98" x2="130" y2="98" stroke="white" stroke-width="1"/>
  <line x1="98" y1="114" x2="142" y2="114" stroke="white" stroke-width="1"/>
  <line x1="98" y1="118" x2="128" y2="118" stroke="white" stroke-width="1"/>

  <!-- Checkmark in middle box -->
  <path d="M 80 96 L 85 100 L 92 92" fill="none" stroke="white" stroke-width="2"/>
</svg>
