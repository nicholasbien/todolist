<\!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="canvas192" width="192" height="192" style="border:1px solid #000;"></canvas>
<canvas id="canvas512" width="512" height="512" style="border:1px solid #000;"></canvas>
<script>
function drawNotebook(ctx, size) {
  const scale = size / 192;

  // Background
  ctx.fillStyle = '#ff7b4a';
  ctx.fillRect(0, 0, size, size);

  // Notebook spine (same orange)
  ctx.fillStyle = '#ff7b4a';
  ctx.fillRect(32 * scale, 44 * scale, 24 * scale, 104 * scale);

  // Back notebook cover (offset)
  ctx.fillStyle = '#ff7b4a';
  ctx.beginPath();
  ctx.roundRect(62 * scale, 50 * scale, 104 * scale, 104 * scale, 4 * scale);
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1.5 * scale;
  ctx.stroke();

  // Front notebook cover (main)
  ctx.fillStyle = '#ff7b4a';
  ctx.beginPath();
  ctx.roundRect(56 * scale, 44 * scale, 104 * scale, 104 * scale, 4 * scale);
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1.5 * scale;
  ctx.stroke();

  // Spiral binding - equal distance inside and outside notebook
  ctx.fillStyle = 'white';
  const ringYPositions = [59.75, 70.75, 81.75, 92.75, 103.75, 114.75, 125.75, 136.75];

  // Ring bodies (moderately rounded lines)
  ringYPositions.forEach(y => {
    ctx.beginPath();
    ctx.roundRect(48 * scale, (y - 0.75) * scale, 16 * scale, 1.5 * scale, 0.75 * scale);
    ctx.fill();
  });

  // Ring end circles
  ringYPositions.forEach(y => {
    ctx.beginPath();
    ctx.arc(64 * scale, y * scale, 1.5 * scale, 0, 2 * Math.PI);
    ctx.fill();
  });

  // Cover border (white) - this is handled above with the front cover

  // Three vertical boxes (white)
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1 * scale;
  ctx.strokeRect(78 * scale, 68 * scale, 16 * scale, 16 * scale);
  ctx.strokeRect(78 * scale, 88 * scale, 16 * scale, 16 * scale);
  ctx.strokeRect(78 * scale, 108 * scale, 16 * scale, 16 * scale);

  // Text lines next to boxes (white)
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 1 * scale;
  // First box text lines
  ctx.beginPath();
  ctx.moveTo(98 * scale, 74 * scale);
  ctx.lineTo(140 * scale, 74 * scale);
  ctx.moveTo(98 * scale, 78 * scale);
  ctx.lineTo(135 * scale, 78 * scale);
  ctx.stroke();

  // Second box text lines
  ctx.beginPath();
  ctx.moveTo(98 * scale, 94 * scale);
  ctx.lineTo(145 * scale, 94 * scale);
  ctx.moveTo(98 * scale, 98 * scale);
  ctx.lineTo(130 * scale, 98 * scale);
  ctx.stroke();

  // Third box text lines
  ctx.beginPath();
  ctx.moveTo(98 * scale, 114 * scale);
  ctx.lineTo(142 * scale, 114 * scale);
  ctx.moveTo(98 * scale, 118 * scale);
  ctx.lineTo(128 * scale, 118 * scale);
  ctx.stroke();

  // Checkmark in middle box (white)
  ctx.lineWidth = 2 * scale;
  ctx.beginPath();
  ctx.moveTo(80 * scale, 96 * scale);
  ctx.lineTo(85 * scale, 100 * scale);
  ctx.lineTo(92 * scale, 92 * scale);
  ctx.stroke();
}

// Create 192x192 icon
const canvas192 = document.getElementById('canvas192');
const ctx192 = canvas192.getContext('2d');
drawNotebook(ctx192, 192);

// Create 512x512 icon
const canvas512 = document.getElementById('canvas512');
const ctx512 = canvas512.getContext('2d');
drawNotebook(ctx512, 512);

// Convert to downloads
setTimeout(() => {
  const link192 = document.createElement('a');
  link192.download = 'icon-192x192.png';
  link192.href = canvas192.toDataURL();
  link192.click();

  const link512 = document.createElement('a');
  link512.download = 'icon-512x512.png';
  link512.href = canvas512.toDataURL();
  link512.click();

  // Also log the data URLs for manual saving
  console.log('192x192 PNG data:', canvas192.toDataURL());
  console.log('512x512 PNG data:', canvas512.toDataURL());
}, 1000);
</script>
</body>
</html>
EOF < /dev/null
