<\!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="canvas192" width="192" height="192" style="border:1px solid #000;"></canvas>
<canvas id="canvas512" width="512" height="512" style="border:1px solid #000;"></canvas>
<script>
function drawNotebook(ctx, size) {
  const scale = size / 192;

  // Background
  ctx.fillStyle = '#ff7b4a';
  ctx.fillRect(0, 0, size, size);

  // Centered and bigger notebook with less border
  // Canvas is 192x192, true center is 96
  const canvasSize = 192;
  const centerX = canvasSize / 2;
  const centerY = canvasSize / 2;
  const notebookWidth = 130;
  const notebookHeight = 130;
  const spineWidth = 20;
  const offset3D = 6;  // 3D effect offset

  // Calculate positions for proper centering
  // Total visual width: spine + notebook + 3D offset
  const totalVisualWidth = spineWidth + notebookWidth + offset3D;
  const totalVisualHeight = notebookHeight + offset3D;

  // Center the entire visual element (shifted left to account for visual weight)
  const leftEdge = (canvasSize - totalVisualWidth) / 2 - 8;  // Shift 8px left for better centering
  const topEdge = (canvasSize - totalVisualHeight) / 2;

  const spineX = leftEdge;
  const notebookX = leftEdge + spineWidth;
  const notebookY = topEdge;

  // Notebook spine (same orange)
  ctx.fillStyle = '#ff7b4a';
  ctx.fillRect(spineX * scale, notebookY * scale, spineWidth * scale, notebookHeight * scale);

  // Back notebook cover (offset) - centered with more 3D depth
  ctx.fillStyle = '#ff7b4a';
  ctx.beginPath();
  ctx.roundRect((notebookX + 6) * scale, (notebookY + 6) * scale, notebookWidth * scale, notebookHeight * scale, 4 * scale);
  ctx.fill();
  ctx.strokeStyle = '#000000';  // Black border
  ctx.lineWidth = 3.5 * scale;
  ctx.stroke();

  // Front notebook cover (main) - centered
  ctx.fillStyle = '#ff7b4a';
  ctx.beginPath();
  ctx.roundRect(notebookX * scale, notebookY * scale, notebookWidth * scale, notebookHeight * scale, 4 * scale);
  ctx.fill();
  ctx.strokeStyle = '#000000';  // Black border
  ctx.lineWidth = 3.5 * scale;
  ctx.stroke();

  // Spiral binding - 5 rings (circles inside notebook)
  ctx.fillStyle = '#000000';  // Black spirals
  const ringCount = 5;
  const ringSpacing = notebookHeight / (ringCount + 1);

  // Ring bodies - extend from spine into notebook
  for (let i = 1; i <= ringCount; i++) {
    const y = notebookY + (i * ringSpacing);
    ctx.beginPath();
    ctx.roundRect((spineX + spineWidth / 2) * scale, (y - 1.75) * scale, (spineWidth / 2 + 8) * scale, 3.5 * scale, 1.75 * scale);
    ctx.fill();
  }

  // Ring end circles - positioned inside notebook (solid black)
  for (let i = 1; i <= ringCount; i++) {
    const y = notebookY + (i * ringSpacing);
    ctx.beginPath();
    ctx.arc((notebookX + 8) * scale, y * scale, 5 * scale, 0, 2 * Math.PI);  // Bigger circles
    ctx.fill();
  }

  // Three checkboxes with text - centered in notebook
  const boxSize = 18;
  const boxX = notebookX + 20;  // Left margin inside notebook
  const boxSpacing = notebookHeight / 4;

  // Pink/salmon fill color for boxes
  const boxFillColor = '#ffb8a3';

  // Draw 3 checkboxes
  for (let i = 0; i < 3; i++) {
    const boxY = notebookY + boxSpacing * (i + 0.7);

    // All boxes are pink/salmon (matching reference) with slight rounding
    ctx.fillStyle = boxFillColor;
    ctx.beginPath();
    ctx.roundRect(boxX * scale, boxY * scale, boxSize * scale, boxSize * scale, 2 * scale);
    ctx.fill();

    // Box border color matches line color - solid color calculated from opacity blend
    if (i === 1) {
      ctx.strokeStyle = '#000000';  // Solid black for checked item
    } else {
      // Solid color approximating black @ 50% opacity over #ff7b4a background
      ctx.strokeStyle = '#7f3d25';  // Pre-calculated blend: (255+0)/2=127, (123+0)/2=61, (74+0)/2=37
    }
    ctx.lineWidth = 2.5 * scale;
    ctx.beginPath();
    ctx.roundRect(boxX * scale, boxY * scale, boxSize * scale, boxSize * scale, 2 * scale);
    ctx.stroke();

    // Text line next to checkbox - same color as box outline, thicker like reference
    // (strokeStyle already set above to match box border)
    ctx.lineWidth = 3.5 * scale;  // Thicker to match reference
    ctx.beginPath();
    ctx.moveTo((boxX + boxSize + 6) * scale, (boxY + boxSize/2) * scale);
    ctx.lineTo((notebookX + notebookWidth - 10) * scale, (boxY + boxSize/2) * scale);
    ctx.stroke();
  }

  // Cleaner, simpler checkmark in middle box (matching reference style)
  const middleBoxY = notebookY + boxSpacing * 1.7;
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 2.5 * scale;  // Matching box border thickness
  ctx.lineCap = 'butt';  // Sharp ends like reference
  ctx.lineJoin = 'miter';  // Sharp corners like reference
  ctx.beginPath();
  ctx.moveTo((boxX + 4) * scale, (middleBoxY + boxSize/2) * scale);
  ctx.lineTo((boxX + boxSize/2 - 1) * scale, (middleBoxY + boxSize - 5) * scale);
  ctx.lineTo((boxX + boxSize - 3) * scale, (middleBoxY + 4) * scale);
  ctx.stroke();
}

// Create 192x192 icon
const canvas192 = document.getElementById('canvas192');
const ctx192 = canvas192.getContext('2d');
drawNotebook(ctx192, 192);

// Create 512x512 icon
const canvas512 = document.getElementById('canvas512');
const ctx512 = canvas512.getContext('2d');
drawNotebook(ctx512, 512);

// Convert to downloads
setTimeout(() => {
  const link192 = document.createElement('a');
  link192.download = 'icon-192x192.png';
  link192.href = canvas192.toDataURL();
  link192.click();

  const link512 = document.createElement('a');
  link512.download = 'icon-512x512.png';
  link512.href = canvas512.toDataURL();
  link512.click();

  // Also log the data URLs for manual saving
  console.log('192x192 PNG data:', canvas192.toDataURL());
  console.log('512x512 PNG data:', canvas512.toDataURL());
}, 1000);
</script>
</body>
</html>
