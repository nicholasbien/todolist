[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "node webhook-server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[nixpacks]
nodeVersion = "22"

[variables]
NODE_ENV = "production"
WEBHOOK_PORT = "8080"
WEBHOOK_HOST = "0.0.0.0"
AUTO_CLAIM_ENABLED = "true"
AGENT_ID = "openclaw-webhook"
TODOLIST_AUTH_TOKEN = "nuRy4k53-gH6DlfHgm6ID_s0B0hCEugYdfRUffT63Rk"
TODOLIST_API_URL = "https://todolist-backend-production-a83b.up.railway.app"
DEFAULT_SPACE_ID = "69acacfc4f228ace7e2b3896"
