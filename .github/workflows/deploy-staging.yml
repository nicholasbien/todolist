name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual staging deployment'
        required: true
        default: 'Manual test deployment'

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.get-urls.outputs.frontend_url }}
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN || secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_STAGING_PROJECT_ID || secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_STAGING_ENVIRONMENT }}
      RAILWAY_BACKEND_SERVICE: ${{ secrets.RAILWAY_STAGING_BACKEND_SERVICE }}
      RAILWAY_FRONTEND_SERVICE: ${{ secrets.RAILWAY_STAGING_FRONTEND_SERVICE }}
      RAILWAY_SCRIPTS_SERVICE: ${{ secrets.RAILWAY_STAGING_SCRIPTS_SERVICE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Railway configuration
        run: |
          required_vars=(
            RAILWAY_TOKEN
            RAILWAY_PROJECT_ID
            RAILWAY_ENVIRONMENT
            RAILWAY_BACKEND_SERVICE
            RAILWAY_FRONTEND_SERVICE
            RAILWAY_SCRIPTS_SERVICE
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required GitHub secret: ${var_name}"
              exit 1
            fi
          done

      - name: Deploy backend to staging
        working-directory: backend
        run: |
          npx -y @railway/cli@latest up \
            --ci \
            --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_BACKEND_SERVICE" \
            --message "github:${GITHUB_SHA} backend (staging)"

      - name: Deploy frontend to staging
        working-directory: frontend
        run: |
          npx -y @railway/cli@latest up \
            --ci \
            --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_FRONTEND_SERVICE" \
            --message "github:${GITHUB_SHA} frontend (staging)"

      - name: Deploy scripts to staging
        working-directory: scripts
        run: |
          npx -y @railway/cli@latest up \
            --ci \
            --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SCRIPTS_SERVICE" \
            --message "github:${GITHUB_SHA} scripts (staging)"

      - name: Get staging URLs
        id: get-urls
        run: |
          echo "::notice::Staging deployment complete!"
          echo "::notice::Backend Service: $RAILWAY_BACKEND_SERVICE"
          echo "::notice::Frontend Service: $RAILWAY_FRONTEND_SERVICE"
          echo "::notice::Scripts Service: $RAILWAY_SCRIPTS_SERVICE"
          # Note: Railway CLI doesn't easily expose URLs in CI mode
          # Check Railway dashboard for staging service URLs
